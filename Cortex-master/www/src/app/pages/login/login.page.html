<div class="login-top-logo">
  <img src="../../../assets/images/logo-dark.png" height="40" alt="Cynox Security">
</div>
<div class="login-box cynox-login">
  <div class="login-box-body">
    <div class="brand-pill">
      <h1>Cynox</h1>
    </div>
    <p class="login-box-msg">Secure Access Portal</p>
    
    <form name="loginForm" ng-submit="$ctrl.login()">
      <div class="form-group has-feedback">
        <input type="text" class="form-control" placeholder="Enter your username" ng-model="$ctrl.params.username" autocomplete="off" required>
      </div>
      <div class="form-group has-feedback">
        <input type="password" class="input form-control" placeholder="Enter your password" ng-model="$ctrl.params.password" autocomplete="off" required>
      </div>

      <div class="row mt-l">
        <div class="col-xs-12">
          <button type="submit" class="btn btn-primary btn-m btn-block" ng-disabled="loginForm.$invalid">Sign In Securely</button>
        </div>
      </div>
      
      <p class="auth-notice mt-l text-center text-muted" style="font-size: 10px;">Protected authentication system for authorized users only.</p>

      <div class="sso-login-box" ng-if="$ctrl.ssoEnabled()">
        <div class="mt-s or-separator">OR</div>
    
        <div class="mv-xs">
          <a class="btn btn-success btn-m btn-block" href="./api/ssoLogin">Sign In with SSO</a>
        </div>
      </div>

    </form>
  </div>
  <p class="text-center text-muted mt-s" style="font-size: 10px;">Version</p>
</div>
