<form name="form" ng-submit="$modal.ok()">
  <div class="modal-header" style="border-bottom: 1px solid var(--border-glass); padding: 20px;">
    <h3 class="modal-title" style="margin: 0; font-weight: 700; letter-spacing: 1px;">
      <i class="fa fa-building-o" style="margin-right: 8px;"></i>
      {{{'edit': 'Edit', 'add': 'Create' }[$modal.mode]}} organization
    </h3>
  </div>
  <div class="modal-body" style="padding: 30px;">
    <div class="form-group" style="margin-bottom: 25px;">
      <label style="font-weight: 500; margin-bottom: 8px; display: block;">Name
        <i class="fa fa-asterisk text-danger" style="font-size: 10px;"></i>
      </label>
      <input type="text" class="form-control" ng-model="$modal.formData.name"
        ng-disabled="$modal.formData.id" required placeholder="Organization's name" style="height: 45px; border-radius: 8px;">
    </div>
    <div class="form-group" style="margin-bottom: 10px;">
      <label style="font-weight: 500; margin-bottom: 8px; display: block;">Description
        <i class="fa fa-asterisk text-danger" style="font-size: 10px;"></i>
      </label>
      <input type="text" class="form-control" ng-model="$modal.formData.description" 
        required placeholder="Organization's description" style="height: 45px; border-radius: 8px;">
    </div>
  </div>
  <div class="modal-footer" style="border-top: 1px solid var(--border-glass); padding: 20px;">
    <button class="btn btn-default pull-left" type="button" ng-click="$modal.cancel()" style="border-radius: 8px;">Cancel</button>
    <span class="text-muted pull-left" style="font-size: 12px; margin-top: 8px; margin-left: 15px;">
      <i class="fa fa-asterisk text-danger"></i> Required field
    </span>
    <button class="btn btn-primary pull-right" type="submit" ng-disabled="form.$invalid" style="border-radius: 8px; padding: 6px 25px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);">Save</button>
  </div>
</form>
